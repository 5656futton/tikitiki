<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>チキンゲーム（フェイントver）</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#111;
    color:white;
    text-align:center;
}

h1{ margin:15px; }

#game{
    position:relative;
    width:320px;
    height:520px;
    margin:20px auto;
    background:#222;
    border:3px solid white;
    overflow:hidden;
}

/* カメレオン */
#chameleon{
    position:absolute;
    top:0;
    width:100%;
    height:120px;
    background:limegreen;
    border-bottom-left-radius:60px;
    border-bottom-right-radius:60px;
}

.eye{
    position:absolute;
    top:30px;
    width:30px;
    height:30px;
    background:white;
    border-radius:50%;
}
.eye::after{
    content:"";
    position:absolute;
    top:8px;
    left:8px;
    width:14px;
    height:14px;
    background:black;
    border-radius:50%;
}

#eye1{ left:80px; }
#eye2{ right:80px; }

/* 舌 */
#tongue{
    position:absolute;
    top:100px;
    left:50%;
    transform:translateX(-50%);
    width:30px;
    height:0px;
    background:pink;
    border-radius:20px;
}

/* プレイヤー */
#player{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:40px;
}

/* ボタン */
button{
    padding:12px 25px;
    font-size:16px;
    border:none;
    border-radius:10px;
    background:gold;
    cursor:pointer;
    margin:5px;
}

/* 説明 */
#info{
    font-size:14px;
    margin-top:10px;
    color:#ccc;
}

/* 結果 */
#result{
    font-size:22px;
    margin-top:10px;
    height:60px;
}

</style>
</head>

<body>

<h1>👅 チキンゲーム</h1>

<div id="game">
    <div id="chameleon">
        <div id="eye1" class="eye"></div>
        <div id="eye2" class="eye"></div>
    </div>

    <div id="tongue"></div>
    <div id="player">😨</div>
</div>

<button onclick="startGame()">スタート</button>
<button onclick="dodge()">回避！</button>

<div id="info">
🕹 操作：ボタン or Enterキーで回避！<br>
⚠ 舌は途中で止まる（フェイントあり）！焦るな！
</div>

<div id="result"></div>

<script>

let tongueLength = 0;
let speed = 3;
let gameRunning = false;
let dodged = false;

// フェイント用
let feintTriggered = false;
let feintTime = 0;

function startGame(){
    tongueLength = 0;
    speed = 2 + Math.random()*4;
    gameRunning = true;
    dodged = false;
    feintTriggered = false;

    document.getElementById("tongue").style.height = "0px";
    document.getElementById("player").innerText="😨";
    document.getElementById("result").innerText="";

    loop();
}

function loop(){
    if(!gameRunning) return;

    // フェイント発動（ランダム）
    if(!feintTriggered && tongueLength > 100 && Math.random() < 0.02){
        feintTriggered = true;
        feintTime = 30; // 約0.5秒停止
    }

    if(feintTime > 0){
        feintTime--;
    }else{
        tongueLength += speed;
    }

    document.getElementById("tongue").style.height = tongueLength + "px";

    if(tongueLength > 380 && !dodged){
        gameRunning = false;
        showResult(false);
        return;
    }

    requestAnimationFrame(loop);
}

function dodge(){
    if(!gameRunning || dodged) return;

    dodged = true;
    gameRunning = false;

    document.getElementById("player").innerText="😎";

    showResult(true);
}

// Enterキー対応
document.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        dodge();
    }
});

function showResult(success){

    let distance = Math.max(0, 380 - tongueLength);
    let score = Math.floor(1000 / (distance + 1));

    if(!success){
        document.getElementById("result").innerText =
        "💀 食べられた… スコア: 0";
        return;
    }

    let text = "";

    if(distance < 20){
        text = "🔥 神回避！！！";
    }else if(distance < 60){
        text = "😏 いい感じ！";
    }else{
        text = "🙂 まだ余裕あるな…";
    }

    document.getElementById("result").innerText =
    text + " スコア: " + score;
}

</script>

</body>
</html>
